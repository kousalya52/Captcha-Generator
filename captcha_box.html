<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Captcha Generator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <div class="content">
        <h2>Captcha Generator</h2>
        <div class="box">
            <input type="text" id="abc" readonly>
            <button onclick="refresh()"><i class="fa-solid fa-arrow-rotate-right"></i></button>
        </div>
        <input type="text" id="xyz" placeholder="Enter captcha">
        <div class="last">
            <button onclick="checkcaptcha()">Submit Captcha</button>
            <p id="result"></p>
        </div>
    </div>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            font-family: Arial, Helvetica, sans-serif;
        }

        .content {
            width: 100%;
            max-width: 420px;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0px 15px 35px rgba(0, 0, 0, 0.25);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        h2 {
            text-align: center;
            color: #333;
        }

        input {
            width: 100%;
            height: 48px;
            padding: 0 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }

        .box {
            position: relative;
            width: 100%;
        }

        .box button {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            width: 34px;
            height: 34px;
            border: none;
            border-radius: 6px;
            background: blueviolet;
            color: white;
            cursor: pointer;
        }

        .last button {
            width: 100%;
            height: 48px;
            border: none;
            border-radius: 8px;
            background: blueviolet;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        .last button:hover {
            opacity: 0.9;
        }

        #result {
            text-align: center;
            margin-top: 10px;
            font-weight: bold;
            min-height: 20px;
        }

        @media (max-width: 1440px) {
            .content {
                max-width: 420px;
            }
        }

        @media (max-width: 1024px) {
            .content {
                max-width: 400px;
            }

            h2 {
                font-size: 1.8rem;
            }
        }

        @media (max-width: 768px) {
            .content {
                max-width: 360px;
                padding: 22px;
            }

            h2 {
                font-size: 1.6rem;
            }

            input,
            .last button {
                height: 45px;
            }
        }

        @media (max-width: 425px) {
            .content {
                max-width: 100%;
                padding: 20px;
            }

            h2 {
                font-size: 1.4rem;
            }

            input,
            .last button {
                height: 44px;
                font-size: 15px;
            }
        }

        @media (max-width: 375px) {
            body {
                padding: 15px;
            }

            .content {
                padding: 18px;
            }

            h2 {
                font-size: 1.3rem;
            }

            input,
            .last button {
                height: 42px;
                font-size: 14px;
            }

            .box button {
                width: 32px;
                height: 32px;
            }
        }

        @media (max-width: 320px) {
            body {
                padding: 10px;
            }

            .content {
                padding: 15px;
            }

            h2 {
                font-size: 1.2rem;
            }

            input,
            .last button {
                height: 40px;
                font-size: 13px;
            }

            .box button {
                width: 30px;
                height: 30px;
            }
        }
    </style>
    <script>
        function refresh() {
            let char = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ1234567890";
            let s = "";
            for (let i = 0; i < 6; i++) {
                s = s + char[Math.floor(Math.random() * 62)]
            }
            document.getElementById("abc").value = s;
        }
        refresh();

        function checkcaptcha() {
            let val1 = document.getElementById("abc").value;
            let val2 = document.getElementById("xyz").value;
            if (val1 == val2) {
                document.getElementById("result").innerHTML = "✅ Correct Captcha";
                document.getElementById("result").style.color = "green";
            } else {
                document.getElementById("result").innerHTML = "❌ Incorrect Captcha";
                document.getElementById("result").style.color = "red";
            }
        }

    </script>
</body>

</html>
